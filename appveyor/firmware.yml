image: Ubuntu2004
branches:
  only:
    - main

# set clone depth
clone_depth: 1

build_script:
  - #chmod +x appveyor/firmware.sh && ./appveyor/firmware.sh
  - echo "I am the void" >sllin-firmware.tar.xz

artifacts:
  - path: sllin-firmware.tar.xz
    name: files

deploy:
  - provider: GitHub
    release: latest-main
    description: 'Builds slLIN firmware from latest main sources'
    artifact: files
    draft: false
    prerelease: true
    force_update: true
    auth_token:
      secure: w0WvJ+J8wm9BVj4E7zODb6NABBHzq2OCje/TqT/mOO+EVFmHpBU+kXmOxehwPbG1
    on:
      branch: main                # release from main branch only

  - provider: GitHub
    release: $(APPVEYOR_REPO_TAG_NAME)
    description: 'slLIN $(APPVEYOR_REPO_TAG_NAME)'
    artifact: files
    draft: true
    prerelease: false
    force_update: true
    auth_token:
      secure: w0WvJ+J8wm9BVj4E7zODb6NABBHzq2OCje/TqT/mOO+EVFmHpBU+kXmOxehwPbG1
    on:
      APPVEYOR_REPO_TAG: true       # deploy on tag push only

